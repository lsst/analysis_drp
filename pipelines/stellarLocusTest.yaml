      name: "wFit"
      connections.fitType: "CModel_wFit"
  plot_griCModel_wFit:
    class: lsst.analysis.drp.colorColorFitPlot.ColorColorFitPlotTask
    config:
      xColName: grCModelMag
      yColName: riCModelMag
      xLabel: "g - r [CModel] (mag)"
      yLabel: "r - i [CModel] (mag)"
      name: "wFit"
      connections.plotName: "CModel_wFit"
