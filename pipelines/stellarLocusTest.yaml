description: Make colour analysis plots
tasks:
  addQAColumns:
    class: lsst.analysis.drp.addQAColumns.AddQAColumnsTask
  calcStellarLocusParams_PSF_wFit:
    class: lsst.analysis.drp.calcStellarLocusParams.CalcStellarLocusParamsTask
    config:
      xColName: grPsMag
      yColName: riPsMag
      name: "wFit"
      connections.fitType: "PSF_wFit"
  plot_griPSF_wFit:
    class: lsst.analysis.drp.colorColorFitPlot.ColorColorFitPlotTask
    config:
      xColName: grPsMag
      yColName: riPsMag
      xLabel: "g - r [PSF] (mag)"
      yLabel: "r - i [PSF] (mag)"
      name: "wFit"
      connections.plotName: "PSF_wFit"
  calcStellarLocusParams_CModel_wFit:
    class: lsst.analysis.drp.calcStellarLocusParams.CalcStellarLocusParamsTask
